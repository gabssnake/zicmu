<!DOCTYPE html>
<html lang="en">
<head>
  <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liner · zicmu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ---- base ---- */
        *, *::before, *::after { box-sizing: border-box; --translate-x: 0; --translate-y: 0; }

        /* custom colors */
        :root {
            --paper: #F9F8F6;
            --ink: #1A1A1A;
            --ink-light: #4A4A4A;
        }

        /* ---- display ---- */
        .flex { display: flex; }
        .grid { display: grid; }
        .hidden { display: none; }
        .block { display: block; }

        /* ---- flex/grid ---- */
        .flex-col { flex-direction: column; }
        .flex-1 { flex: 1 1 0%; }
        .items-center { align-items: center; }
        .items-start { align-items: flex-start; }
        .justify-between { justify-content: space-between; }
        .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .gap-x-6 { column-gap: 1.5rem; }
        .gap-y-12 { row-gap: 3rem; }
        .gap-12 { gap: 3rem; }
        .gap-24 { gap: 6rem; }

        /* ---- position ---- */
        .relative { position: relative; }
        .absolute { position: absolute; }
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .top-0 { top: 0; }
        .top-1\/2 { top: 50%; }
        .left-0 { left: 0; }
        .left-1\/2 { left: 50%; }
        .bottom-6 { bottom: 1.5rem; }
        .z-10 { z-index: 10; }
        .z-20 { z-index: 20; }
        .z-40 { z-index: 40; }
        .z-50 { z-index: 50; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .ml-1 { margin-left: 0.25rem; }
        .ml-2 { margin-left: 0.5rem; }
        .pointer-events-none { pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        .cursor-pointer { cursor: pointer; }

        /* ---- transforms (composed via CSS vars) ---- */
        .-translate-x-1\/2 {
            --translate-x: -50%;
            transform: translateX(var(--translate-x)) translateY(var(--translate-y));
        }
        .translate-y-24 {
            --translate-y: 6rem;
            transform: translateX(var(--translate-x)) translateY(var(--translate-y));
        }
        .translate-y-0 {
            --translate-y: 0px;
            transform: translateX(var(--translate-x)) translateY(var(--translate-y));
        }

        /* ---- size ---- */
        .w-full { width: 100%; }
        .w-3 { width: 0.75rem; }
        .w-4 { width: 1rem; }
        .w-5 { width: 1.25rem; }
        .w-8 { width: 2rem; }
        .w-12 { width: 3rem; }
        .w-16 { width: 4rem; }
        .w-48 { width: 12rem; }
        .h-1 { height: 0.25rem; }
        .h-3 { height: 0.75rem; }
        .h-4 { height: 1rem; }
        .h-5 { height: 1.25rem; }
        .h-full { height: 100%; }
        .h-8 { height: 2rem; }
        .h-12 { height: 3rem; }
        .h-16 { height: 4rem; }
        .aspect-square { aspect-ratio: 1 / 1; }
        .max-w-md { max-width: 28rem; }
        .max-w-screen-2xl { max-width: 1536px; }
        .max-w-\[150px\] { max-width: 150px; }
        .min-h-screen { min-height: 100vh; }

        /* ---- overflow ---- */
        .overflow-hidden { overflow: hidden; }
        .overflow-x-hidden { overflow-x: hidden; }
        .overflow-y-auto { overflow-y: auto; }

        /* ---- spacing ---- */
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .pb-24 { padding-bottom: 6rem; }
        .pt-28 { padding-top: 7rem; }
        .pt-4 { padding-top: 1rem; }
        .pt-6 { padding-top: 1.5rem; }
        .pr-4 { padding-right: 1rem; }
        .p-2 { padding: 0.5rem; }
        .p-3 { padding: 0.75rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-12 { margin-bottom: 3rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-8 { margin-top: 2rem; }
        .mt-0\.5 { margin-top: 0.125rem; }
        .-mt-1\.5 { margin-top: -0.375rem; }
        .-ml-1\.5 { margin-left: -0.375rem; }

        /* ---- typography ---- */
        .font-sans { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
        .font-serif { font-family: 'Playfair Display', ui-serif, Georgia, serif; }
        .text-xs { font-size: 0.75rem; line-height: 1rem; }
        .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
        .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-5xl { font-size: 3rem; line-height: 1; }
        .text-\[10px\] { font-size: 10px; }
        .font-medium { font-weight: 500; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }
        .tracking-\[0\.2em\] { letter-spacing: 0.2em; }
        .tracking-wider { letter-spacing: 0.05em; }
        .tracking-wide { letter-spacing: 0.025em; }
        .uppercase { text-transform: uppercase; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .text-right { text-align: right; }
        .leading-tight { line-height: 1.25; }
        .space-y-1 > * + * { margin-top: 0.25rem; }

        /* ---- custom colors ---- */
        .text-ink { color: var(--ink); }
        .text-inkLight { color: var(--ink-light); }
        .text-paper { color: var(--paper); }
        .text-white { color: #ffffff; }
        .text-gray-400 { color: #9ca3af; }
        .bg-ink { background-color: var(--ink); }
        .bg-paper { background-color: var(--paper); }
        .bg-white\/90 { background-color: rgba(255,255,255,0.9); }
        .bg-black\/30 { background-color: rgba(0,0,0,0.3); }
        .bg-gray-200 { background-color: #e5e7eb; }
        .bg-gray-100 { background-color: #f3f4f6; }
        .border-gray-200 { border-color: #e5e7eb; }
        .border-gray-100 { border-color: #f3f4f6; }

        /* ---- selection ---- */
        ::selection { background-color: var(--ink); color: var(--paper); }

        /* ---- border ---- */
        .border { border-width: 1px; border-style: solid; }
        .border-t { border-top-width: 1px; border-top-style: solid; }
        .rounded-full { border-radius: 9999px; }

        /* ---- shadow ---- */
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

        /* ---- effects ---- */
        .backdrop-blur-sm { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .backdrop-blur-md { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .opacity-0 { opacity: 0; }
        .opacity-100 { opacity: 1; }

        /* ---- transitions ---- */
        .transition-all { transition: all 150ms cubic-bezier(0.4,0,0.2,1); }
        .transition-colors { transition: color 150ms cubic-bezier(0.4,0,0.2,1), background-color 150ms cubic-bezier(0.4,0,0.2,1), border-color 150ms cubic-bezier(0.4,0,0.2,1); }
        .transition-transform { transition: transform 150ms cubic-bezier(0.4,0,0.2,1); }
        .transition-opacity { transition: opacity 150ms cubic-bezier(0.4,0,0.2,1); }
        .duration-100 { transition-duration: 100ms; }
        .duration-200 { transition-duration: 200ms; }
        .duration-300 { transition-duration: 300ms; }
        .duration-500 { transition-duration: 500ms; }
        .duration-700 { transition-duration: 700ms; }

        /* ---- animate ---- */
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        /* ---- hover ---- */
        .hover\:text-ink:hover { color: var(--ink); }
        .hover\:scale-105:hover { transform: scale(1.05); }
        .hover\:bg-gray-100:hover { background-color: #f3f4f6; }

        /* ---- group hover ---- */
        .group:hover .group-hover\:scale-105 { transform: scale(1.05); }
        .group:hover .group-hover\:scale-\[1\.02\] { transform: scale(1.02); }
        .group:hover .group-hover\:opacity-100 { opacity: 1; }
        .group:hover .group-hover\:bg-black\/10 { background-color: rgba(0,0,0,0.1); }
        .group:hover .group-hover\:text-gray-600 { color: #4b5563; }
        .hover\:bg-gray-100:hover { background-color: #f3f4f6; }
        .hover\:text-ink:hover { color: var(--ink); }
        .hover\:bg-gray-100:hover { background-color: #f3f4f6; }
        .bg-black\/0 { background-color: rgba(0,0,0,0); }

        /* ---- responsive ---- */
        @media (min-width: 768px) {
          .md\:px-12 { padding-left: 3rem; padding-right: 3rem; }
          .md\:w-1\/2 { width: 50%; }
          .md\:flex-row { flex-direction: row; }
          .md\:items-start { align-items: flex-start; }
          .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
          .md\:gap-24 { gap: 6rem; }
          .md\:text-5xl { font-size: 3rem; line-height: 1; }
          .md\:text-xl { font-size: 1.25rem; line-height: 1.75rem; }
          .md\:max-h-\[70vh\] { max-height: 70vh; }
          .md\:max-w-\[200px\] { max-width: 200px; }
        }
        @media (min-width: 1024px) {
          .lg\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
        @media (min-width: 1280px) {
          .xl\:grid-cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
        }

        body {
            background-color: #F9F8F6;
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.8s ease;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .album-cover-shadow {
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2), 0 0 1px rgba(0,0,0,0.1);
        }

        .vinyl-record {
            position: absolute;
            top: 5%;
            right: 5%;
            width: 90%;
            height: 90%;
            background: #111;
            border-radius: 50%;
            z-index: -1;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: inset 0 0 0 4px #222, inset 0 0 0 10px #111, inset 0 0 0 12px #222, inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-record::after {
            content: '';
            width: 33%;
            height: 33%;
            background: var(--album-color, #ff5e5e);
            border-radius: 50%;
            border: 2px solid #111;
        }

        .vinyl-record::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            z-index: 10;
        }

        .is-playing .vinyl-record {
            transform: translateX(45%) rotate(0deg);
            animation: vinyl-spin 4s linear infinite;
        }

        .is-paused .vinyl-record {
            transform: translateX(45%) rotate(0deg);
        }

        @keyframes vinyl-spin {
            100% { transform: translateX(45%) rotate(360deg); }
        }

        @media (max-width: 768px) {
            .is-playing .vinyl-record, .is-paused .vinyl-record {
                transform: translateY(-45%);
            }
            @keyframes vinyl-spin {
                100% { transform: translateY(-45%) rotate(360deg); }
            }
        }

        .progress-bar-container:hover .progress-handle {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden selection:bg-ink selection:text-paper">

    <header class="fixed top-0 w-full px-6 py-8 md:px-12 z-40 flex justify-between items-center pointer-events-none">
        <h1 id="app-title" class="font-sans text-xs font-bold tracking-[0.2em] uppercase text-ink pointer-events-auto cursor-pointer">
            Liner
        </h1>
        <button id="back-btn" class="opacity-0 pointer-events-none transition-opacity duration-300 font-sans text-xs font-medium tracking-wider uppercase text-inkLight hover:text-ink pointer-events-auto flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Collection
        </button>
    </header>

    <main class="pt-28 pb-24 px-6 md:px-12 max-w-screen-2xl mx-auto min-h-screen flex flex-col">

        <div id="view-library" class="transition-all duration-500">
            <div class="mb-12">
                <h2 class="font-serif text-4xl md:text-5xl text-ink mb-3">Your Library</h2>
                <p class="font-sans text-sm text-inkLight">High Fidelity. No Distractions.</p>
            </div>
            <div id="library-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-6 gap-y-12">
            </div>
        </div>

        <div id="view-album" class="hidden opacity-0 transition-all duration-500 flex-1 flex flex-col md:flex-row items-center md:items-start gap-12 md:gap-24 pt-4">

            <div id="cover-container" class="w-full max-w-md md:w-1/2 relative z-10 aspect-square group cursor-pointer">
                <div id="vinyl" class="vinyl-record"></div>
                <img id="album-cover" src="" alt="Album Cover" class="w-full h-full object-cover album-cover-shadow relative z-10 transition-transform duration-500 group-hover:scale-[1.02]">

                <div class="absolute inset-0 z-20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <div class="bg-black/30 backdrop-blur-sm w-16 h-16 rounded-full flex items-center justify-center text-white">
                        <svg id="cover-play-icon" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-1/2 flex flex-col h-full md:max-h-[70vh]">
                <div class="mb-8">
                    <h2 id="album-title" class="font-serif text-3xl md:text-5xl font-bold leading-tight mb-2">Album Title</h2>
                    <h3 id="album-artist" class="font-sans text-lg md:text-xl text-inkLight font-medium">Artist Name</h3>
                    <div class="flex items-center gap-4 mt-4 text-xs font-sans text-inkLight uppercase tracking-wider">
                        <span id="album-year">—</span>
                    </div>
                </div>

                <div id="tracklist-container" class="flex-1 overflow-y-auto pr-4 font-sans relative">
                    <ul id="tracklist" class="space-y-1"></ul>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-200">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex flex-col">
                            <span id="now-playing-title" class="font-medium text-sm truncate w-48">Select a track</span>
                            <span id="now-playing-artist" class="text-xs text-inkLight truncate w-48">—</span>
                        </div>

                        <div class="flex items-center gap-6">
                            <button id="btn-prev" class="text-inkLight hover:text-ink transition-colors">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                            </button>
                            <button id="btn-play-pause" class="w-12 h-12 flex items-center justify-center rounded-full bg-ink text-paper hover:scale-105 transition-transform">
                                <svg id="main-play-icon" class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                            <button id="btn-next" class="text-inkLight hover:text-ink transition-colors">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 text-[10px] font-sans text-inkLight tracking-wide">
                        <span id="time-current" class="w-8 text-right">0:00</span>
                        <div id="progress-bar-container" class="progress-bar-container relative flex-1 h-1 bg-gray-200 rounded-full cursor-pointer">
                            <div id="progress-bar" class="absolute top-0 left-0 h-full bg-ink rounded-full w-0 transition-all duration-100 pointer-events-none"></div>
                            <div id="progress-handle" class="progress-handle absolute top-1/2 -mt-1.5 -ml-1.5 w-3 h-3 bg-ink rounded-full opacity-0 transition-opacity duration-200 pointer-events-none" style="left:0%"></div>
                        </div>
                        <span id="time-total" class="w-8">0:00</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="mini-player" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md shadow-2xl rounded-full px-6 py-3 flex items-center gap-4 transition-all duration-500 translate-y-24 opacity-0 z-50 cursor-pointer border border-gray-100">
        <div class="w-8 h-8 rounded-full overflow-hidden" id="mini-vinyl">
            <img id="mini-cover" src="" alt="" class="w-full h-full object-cover">
        </div>
        <div class="flex flex-col max-w-[150px] md:max-w-[200px]">
            <span id="mini-title" class="text-xs font-semibold truncate text-ink">—</span>
            <span id="mini-artist" class="text-[10px] truncate text-inkLight">—</span>
        </div>
        <button id="mini-btn-play" class="ml-2 text-ink p-2 hover:bg-gray-100 rounded-full transition-colors">
            <svg id="mini-play-icon" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>

    <script type="module">
        import { initPlayer, formatTime, trackProgress, seekFromClick, setupKeyboard } from './skin.js';

        // --- helpers ---

        const VINYL_COLORS = ['#2c3e50','#8e44ad','#d35400','#e74c3c','#7f8c8d','#2980b9','#27ae60','#16a085','#f39c12','#c0392b'];

        // --- DOM refs ---

        const $ = id => document.getElementById(id);
        const els = {
            viewLibrary:        $('view-library'),
            viewAlbum:          $('view-album'),
            libraryGrid:        $('library-grid'),
            appTitle:           $('app-title'),
            backBtn:            $('back-btn'),

            coverContainer:     $('cover-container'),
            vinyl:              $('vinyl'),
            albumCover:         $('album-cover'),
            coverPlayIcon:      $('cover-play-icon'),
            albumTitle:         $('album-title'),
            albumArtist:        $('album-artist'),
            albumYear:          $('album-year'),
            tracklist:          $('tracklist'),
            nowPlayingTitle:    $('now-playing-title'),
            nowPlayingArtist:   $('now-playing-artist'),
            mainPlayIcon:       $('main-play-icon'),
            timeCurrent:        $('time-current'),
            timeTotal:          $('time-total'),
            progressBar:        $('progress-bar'),
            progressHandle:     $('progress-handle'),
            progressContainer:  $('progress-bar-container'),
            btnPrev:            $('btn-prev'),
            btnPlayPause:       $('btn-play-pause'),
            btnNext:            $('btn-next'),

            miniPlayer:         $('mini-player'),
            miniVinyl:          $('mini-vinyl'),
            miniCover:          $('mini-cover'),
            miniTitle:          $('mini-title'),
            miniArtist:         $('mini-artist'),
            miniPlayIcon:       $('mini-play-icon'),
            miniBtnPlay:        $('mini-btn-play'),
        };

        // --- state ---

        let currentView = 'library';
        let viewingAlbum = null;

        const ICON_PLAY  = '<path d="M8 5v14l11-7z"/>';
        const ICON_PAUSE = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

        // --- vinyl animation ---

        function setVinylState(state) {
            els.coverContainer.classList.remove('is-playing', 'is-paused');
            if (state === 'playing') els.coverContainer.classList.add('is-playing');
            else if (state === 'paused') els.coverContainer.classList.add('is-paused');
        }

        // --- play icon sync ---

        function syncPlayIcons(playing) {
            const iconPath = playing ? ICON_PAUSE : ICON_PLAY;
            els.mainPlayIcon.innerHTML = iconPath;
            els.coverPlayIcon.innerHTML = iconPath;
            els.miniPlayIcon.innerHTML = iconPath;
            els.mainPlayIcon.classList.toggle('ml-1', !playing);
            els.coverPlayIcon.classList.toggle('ml-1', !playing);

            if (currentView === 'album' && player.currentAlbum && viewingAlbum?.id === player.currentAlbum.id) {
                setVinylState(playing ? 'playing' : 'paused');
            }

            updateMiniPlayerVisibility();
        }

        // --- mini player ---

        function updateMiniPlayer() {
            if (!player.currentAlbum) return;
            const album = player.currentAlbum;
            const track = album.tracks[player.currentTrackIndex];
            els.miniCover.src = album.cover || '';
            els.miniTitle.textContent = track.title;
            els.miniArtist.textContent = album.artist;

            if (player.isPlaying) {
                els.miniVinyl.classList.add('animate-spin');
            } else {
                els.miniVinyl.classList.remove('animate-spin');
            }
        }

        function updateMiniPlayerVisibility() {
            const shouldShow = currentView === 'library' && player.currentAlbum != null;
            if (shouldShow) {
                els.miniPlayer.classList.remove('translate-y-24', 'opacity-0');
                els.miniPlayer.classList.add('translate-y-0', 'opacity-100');
                updateMiniPlayer();
            } else {
                els.miniPlayer.classList.add('translate-y-24', 'opacity-0');
                els.miniPlayer.classList.remove('translate-y-0', 'opacity-100');
            }
        }

        // --- views ---

        function showLibrary() {
            if (currentView === 'library') return;
            currentView = 'library';
            document.body.style.backgroundColor = '#F9F8F6';

            els.viewAlbum.classList.add('opacity-0');
            els.backBtn.classList.add('opacity-0', 'pointer-events-none');

            setTimeout(() => {
                els.viewAlbum.classList.add('hidden');
                els.viewLibrary.classList.remove('hidden', 'absolute');
                requestAnimationFrame(() => {
                    els.viewLibrary.classList.remove('opacity-0', 'pointer-events-none');
                });
            }, 500);

            updateMiniPlayerVisibility();
        }

        function openAlbum(album, albumIndex) {
            viewingAlbum = album;
            currentView = 'album';

            els.albumCover.src = album.cover || '';
            els.albumTitle.textContent = album.title;
            els.albumArtist.textContent = album.artist;
            els.albumYear.textContent = album.year ?? '—';
            els.vinyl.style.setProperty('--album-color', VINYL_COLORS[albumIndex % VINYL_COLORS.length]);

            renderTracklist();

            els.viewLibrary.classList.add('opacity-0', 'pointer-events-none', 'absolute');
            setTimeout(() => {
                els.viewLibrary.classList.add('hidden');
                els.viewAlbum.classList.remove('hidden');
                requestAnimationFrame(() => {
                    els.viewAlbum.classList.remove('opacity-0');
                    els.backBtn.classList.remove('opacity-0', 'pointer-events-none');
                });
            }, 500);

            if (player.currentAlbum?.id === album.id) {
                syncPlayIcons(player.isPlaying);
                updateNowPlayingLabel();
            } else {
                setVinylState('stopped');
                els.nowPlayingTitle.textContent = album.tracks[0]?.title ?? '—';
                els.nowPlayingArtist.textContent = album.artist;
                els.timeCurrent.textContent = '0:00';
                els.timeTotal.textContent = '0:00';
                els.progressBar.style.width = '0%';
                els.progressHandle.style.left = '0%';
            }

            updateMiniPlayerVisibility();
        }

        function returnToAlbum() {
            if (player.currentAlbum) {
                const idx = albums.findIndex(a => a.id === player.currentAlbum.id);
                openAlbum(player.currentAlbum, idx);
            }
        }

        function renderTracklist() {
            if (!viewingAlbum) return;
            els.tracklist.innerHTML = '';
            viewingAlbum.tracks.forEach((track, i) => {
                const nextStart = viewingAlbum.tracks[i + 1]?.start;
                const durLabel = nextStart == null ? '--:--' : formatTime(nextStart - track.start);
                const isActive = player.currentAlbum?.id === viewingAlbum.id && player.currentTrackIndex === i;

                const li = document.createElement('li');
                li.className = `group flex items-center justify-between p-3 rounded-md cursor-pointer transition-colors hover:bg-gray-100 ${isActive ? 'bg-gray-100 font-medium' : 'text-inkLight hover:text-ink'}`;
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-xs w-4 text-right ${isActive ? 'text-ink' : 'text-gray-400'}">${i + 1}</span>
                        <span class="text-sm ${isActive ? 'text-ink' : ''}">${track.title}</span>
                    </div>
                    <span class="text-xs text-gray-400 group-hover:text-gray-600 transition-colors">${durLabel}</span>
                `;
                li.addEventListener('click', () => {
                    if (player.currentAlbum?.id === viewingAlbum.id && player.currentTrackIndex === i) {
                        player.toggle();
                    } else {
                        player.loadAlbum(viewingAlbum, i);
                        player.play();
                    }
                });
                els.tracklist.appendChild(li);
            });
        }

        function updateNowPlayingLabel() {
            if (!player.currentAlbum || !viewingAlbum || player.currentAlbum.id !== viewingAlbum.id) return;
            const track = player.currentAlbum.tracks[player.currentTrackIndex];
            els.nowPlayingTitle.textContent = track.title;
            els.nowPlayingArtist.textContent = player.currentAlbum.artist;
        }

        function renderLibrary(albums) {
            els.libraryGrid.innerHTML = '';
            albums.forEach((album, idx) => {
                const card = document.createElement('div');
                card.className = 'group cursor-pointer flex flex-col gap-3';
                card.innerHTML = `
                    <div class="relative w-full aspect-square overflow-hidden bg-gray-200">
                        <img src="${album.cover || ''}" alt="${album.title}"
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 album-cover-shadow"
                             onerror="this.removeAttribute('src')">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div>
                    </div>
                    <div>
                        <h4 class="font-sans font-semibold text-sm text-ink truncate">${album.title}</h4>
                        <p class="font-sans text-xs text-inkLight truncate mt-0.5">${album.artist}</p>
                    </div>
                `;
                card.addEventListener('click', () => openAlbum(album, idx));
                els.libraryGrid.appendChild(card);
            });
        }

        // --- boot ---

        const { player, albums } = await initPlayer();

        renderLibrary(albums);

        if (player.currentAlbum) {
            const idx = albums.findIndex(a => a.id === player.currentAlbum.id);
            openAlbum(player.currentAlbum, idx);
        }

        // --- player events ---

        player.on('albumloaded', ({ album }) => {
            if (viewingAlbum?.id === album.id) {
                renderTracklist();
                updateNowPlayingLabel();
            }
            updateMiniPlayer();
        });

        player.on('trackchange', ({ album, trackIndex, track }) => {
            if (viewingAlbum?.id === album.id) {
                renderTracklist();
                els.nowPlayingTitle.textContent = track.title;
                els.nowPlayingArtist.textContent = album.artist;
            }
            updateMiniPlayer();
        });

        player.on('play', () => {
            syncPlayIcons(true);
            updateMiniPlayer();
        });

        player.on('pause', () => {
            syncPlayIcons(false);
            updateMiniPlayer();
        });

        player.on('timeupdate', () => {
            if (!player.currentAlbum || player.currentAlbum.id !== viewingAlbum?.id) return;
            const { pct, trackPos, trackDur } = trackProgress(player);
            els.timeCurrent.textContent = formatTime(trackPos);
            els.timeTotal.textContent = formatTime(trackDur);
            els.progressBar.style.width = `${pct}%`;
            els.progressHandle.style.left = `${pct}%`;
        });

        // --- controls ---

        els.appTitle.addEventListener('click', showLibrary);
        els.backBtn.addEventListener('click', showLibrary);

        els.coverContainer.addEventListener('click', () => {
            if (!viewingAlbum) return;
            if (player.currentAlbum?.id === viewingAlbum.id) {
                player.toggle();
            } else {
                player.loadAlbum(viewingAlbum);
                player.play();
            }
        });

        els.btnPlayPause.addEventListener('click', () => {
            if (!viewingAlbum) return;
            if (player.currentAlbum?.id === viewingAlbum.id) {
                player.toggle();
            } else {
                player.loadAlbum(viewingAlbum);
                player.play();
            }
        });

        els.btnPrev.addEventListener('click', () => player.prevTrack());
        els.btnNext.addEventListener('click', () => player.nextTrack());

        els.progressContainer.addEventListener('click', e => seekFromClick(e, els.progressContainer, player));

        els.miniPlayer.addEventListener('click', returnToAlbum);
        els.miniBtnPlay.addEventListener('click', e => {
            e.stopPropagation();
            player.toggle();
        });

        setupKeyboard(player);
    </script>
</body>
</html>
